<!DOCTYPE html>
<html lang="en" data-theme="dark" class="scroll-smooth h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Ranveer Amilkanthwar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #04080f; color: white; cursor: none; }
        .glass-ui-refractive {
            background: rgba(10, 16, 26, 0.65);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #mountainCursor { display: block; position: fixed; pointer-events: none; z-index: 99; }
    </style>
</head>
<body class="p-6 md:p-12 overflow-x-hidden">

    <div id="mountainCursor" class="fixed top-0 left-0 w-8 h-8 pointer-events-none z-50 hidden -translate-x-[16px] -translate-y-[2px]">
        <svg viewBox="0 0 32 32" fill="none" class="w-full h-full drop-shadow-[0_2px_12px_rgba(90,228,255,0.4)]">
            <polygon points="16,2 30,28 2,28" fill="rgba(10, 16, 26, 0.5)" stroke="#5ae4ff" stroke-width="2"/>
        </svg>
    </div>

    <main class="max-w-4xl mx-auto flex flex-col items-center gap-8">
        <header class="w-full flex justify-between items-center glass-ui-refractive p-6 rounded-3xl border border-white/10">
            <a href="index.html" class="font-mono text-[10px] tracking-widest uppercase hover:text-cyan-400 transition-colors">&larr; HOME</a>
            <h1 class="font-black tracking-[0.3em] uppercase">RESUME</h1>
            <a href="index.html#deck-section" class="font-mono text-[10px] tracking-widest uppercase hover:text-emerald-400 transition-colors">MENU</a>
        </header>

        <div class="glass-ui-refractive w-full rounded-3xl p-4 shadow-2xl border border-white/10">
            <img id="domResumeImage" 
                 src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=800&q=80" 
                 alt="Resume Document" class="w-full h-auto rounded-xl">
        </div>

        <a id="downloadResumeBtn" href="#" download="Ranveer_Resume.pdf" 
           class="glass-ui-refractive px-12 py-4 rounded-full font-bold tracking-widest uppercase text-sm hover:scale-105 hover:bg-white hover:text-black transition-all border border-white/10">
            DOWNLOAD PDF RESUME
        </a>
    </main>

    <script>
        const cursor = document.getElementById('mountainCursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        });

        window.addEventListener('DOMContentLoaded', () => {
            const cache = JSON.parse(localStorage.getItem('nomad_cache_scroll_v6'));
            if (cache) {
                // If you uploaded your own, this replaces the example placeholder
                if(cache.photo) document.getElementById('domResumeImage').src = cache.photo;
                if(cache.routes && cache.routes.GitHub) document.getElementById('downloadResumeBtn').href = cache.routes.GitHub;
            }
        });
    </script>
</body>
</html>
